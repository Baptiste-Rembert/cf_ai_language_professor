<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Profesor - Cloudflare Agent</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 h-screen flex flex-col items-center justify-center p-4">

    <div class="bg-white w-full max-w-2xl rounded-xl shadow-lg flex flex-col h-[80vh]">
        <div class="bg-orange-500 text-white p-4 rounded-t-xl flex justify-between items-center">
            <h1 class="text-xl font-bold">🇪🇸 El Profesor (Cloudflare AI)</h1>
            <div class="flex gap-2">
                <button id="viewFlashcardsBtn" class="bg-blue-600 hover:bg-blue-700 px-3 py-1 rounded text-sm font-semibold transition hidden">
                    See the Flashcards
                </button>
                <button id="recapBtn" class="bg-orange-700 hover:bg-orange-800 px-3 py-1 rounded text-sm font-semibold transition">
                    End the lesson (/recap)
                </button>
            </div>
        </div>

        <div id="chatBox" class="flex-1 p-4 overflow-y-auto flex flex-col space-y-4 bg-slate-50">
            <div class="self-start bg-gray-200 text-gray-800 p-3 rounded-lg max-w-[80%]">
                ¡Hola! Soy tu profesor de español. ¿De qué quieres hablar hoy?
            </div>
        </div>

        <div class="p-4 border-t border-gray-200 flex gap-2">
            <input type="text" id="userInput" class="flex-1 border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:border-orange-500" placeholder="Escribe tu mensaje aquí..." onkeypress="handleEnter(event)">
            <button id="sendBtn" class="bg-orange-500 hover:bg-orange-600 text-white px-6 py-2 rounded-lg font-semibold transition">
                Send
            </button>
        </div>
    </div>

    <script>
        const WORKER_URL = "https://language-professor.babaremb.workers.dev";
        
        const chatBox = document.getElementById('chatBox');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const recapBtn = document.getElementById('recapBtn');
        const viewFlashcardsBtn = document.getElementById('viewFlashcardsBtn');

        function addMessage(text, isUser) {
            const div = document.createElement('div');
            div.className = `p-3 rounded-lg max-w-[80%] ${isUser ? 'self-end bg-orange-500 text-white' : 'self-start bg-gray-200 text-gray-800'}`;
            div.textContent = text;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        async function sendMessage(text) {
            if (!text.trim()) return;
            
            userInput.value = '';
            userInput.disabled = true;
            addMessage(text, true);

            try {
                const response = await fetch(WORKER_URL, {
                    method: 'POST',
                    body: text
                });
                
                const reply = await response.text();
                addMessage(reply, false);

                // Reveal the "View Flashcards" button if the user just ended the lesson
                if (text.trim().toLowerCase() === '/recap') {
                    viewFlashcardsBtn.classList.remove('hidden');
                    recapBtn.classList.add('hidden');
                }

            } catch (error) {
                addMessage("Can't reach Worker...", false);
                console.error(error);
            } finally {
                userInput.disabled = false;
                userInput.focus();
            }
        }

        sendBtn.addEventListener('click', () => sendMessage(userInput.value));
        recapBtn.addEventListener('click', () => sendMessage('/recap'));
        
        viewFlashcardsBtn.addEventListener('click', async () => {
            const originalText = viewFlashcardsBtn.textContent;
            viewFlashcardsBtn.textContent = "Loading...";
            try {
                const response = await fetch(WORKER_URL, { method: 'GET' });
                const cards = await response.json();
                
                if (!cards || cards.length === 0) {
                    addMessage("⏳ The workflow is still processing, click again in a few seconds...", false);
                } else {
                    let htmlList = "<strong>Your Flashcards 📚</strong><ul class='list-disc pl-4 mt-2 space-y-2'>";
                    cards.forEach(card => {
                        htmlList += `<li><strong>🇪🇸 ${card.spanish}</strong> <br> 🇬🇧 ${card.english}</li>`;
                    });
                    htmlList += "</ul>";
                    
                    const div = document.createElement('div');
                    div.className = `p-3 rounded-lg max-w-[80%] self-start bg-blue-100 text-blue-900 border border-blue-200`;
                    div.innerHTML = htmlList;
                    chatBox.appendChild(div);
                    chatBox.scrollTop = chatBox.scrollHeight;
                }
            } catch (err) {
                 addMessage("Error fetching flashcards...", false);
            } finally {
                 viewFlashcardsBtn.textContent = originalText;
            }
        });

        function handleEnter(e) {
            if (e.key === 'Enter') sendMessage(userInput.value);
        }
    </script>
</body>
</html>
